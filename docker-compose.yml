services:
  postgres:
    image: postgres:16
    container_name: priority-time-tracker-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: priority_user
      POSTGRES_PASSWORD: priority_password
      POSTGRES_DB: priority_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
